version: 2

project_name: cloudctl

before:
  hooks:
    - go mod tidy

builds:
  - id: cloudctl
    main: .
    binary: cloudctl

    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - darwin
      - windows

    goarch:
      - amd64
      - arm64

    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default

    name_template: >-
      {{ .ProjectName }}_
      {{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}
      {{- end }}

    formats:
      - tar.gz

    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc

release:
  github:
    owner: nitinchouhan1
    name: cloudctl

  draft: false
  prerelease: auto

brews:
  - repository:
      owner: nitinchouhan1
      name: homebrew-cloudctl

    homepage: "https://github.com/nitinchouhan1/cloudctl"

    description: "Unified cloud deployment CLI for AWS, GCP, and Azure"

    license: "MIT"

scoops:
  - repository:
      owner: nitinchouhan1
      name: scoop-cloudctl

    homepage: "https://github.com/nitinchouhan1/cloudctl"

    description: "Unified cloud deployment CLI for AWS, GCP, and Azure"

    license: MIT